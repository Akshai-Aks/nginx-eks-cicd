apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccountName: nginx-sa
      containers:
        - name: nginx
          image: ${IMAGE_URI}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          env:
            - name: APP_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nginx-synced-secret
                  key: db_username
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nginx-synced-secret
                  key: db_password
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: nginx-spc
